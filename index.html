<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=Inter:wght@400;500;600&display=swap');
:root{--bg:#F7F4EE;--surface:#FFFFFF;--surface-2:#F0F0F0;--bubble-bot:#FFFFFF;--bubble-user:#D97757;--line:#E7E1D6;--text:#2B2520;--text-dim:#928C7F;--accent:#D97757;--accent-soft:#F1DDD2;--err:#B23B3B;--err-soft:#F4E1E1;--good:#2e7d32;--good-soft:#e6f4e6;--code-bg:#F1EDE5;color-scheme:light;}
html[data-theme="dark"]{--bg:#1C1A17;--surface:#252220;--surface-2:#2E2A26;--bubble-bot:#2E2A26;--bubble-user:#D97757;--line:#3A352F;--text:#EFEAE2;--text-dim:#948C7F;--accent:#E08A68;--accent-soft:#3A2E27;--err:#E07070;--err-soft:#3A2424;--good:#7CC47F;--good-soft:#233A26;--code-bg:#2A2622;color-scheme:dark;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);}
#pinScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;z-index:999;}
.pin-logo{width:56px;height:56px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.pin-dot-inner{width:18px;height:18px;border-radius:50%;background:var(--bg);}
.pin-title{font-family:'Source Serif 4',serif;font-size:22px;font-weight:600;}
.pin-dots{display:flex;gap:14px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);background:transparent;transition:background .15s;}
.pin-dot.filled{background:var(--accent);}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;}
.pin-key{width:72px;height:72px;border-radius:50%;border:1px solid var(--line);background:var(--surface);font-size:20px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;color:var(--text);transition:background .1s;}
.pin-key:active{background:var(--accent-soft);}
.pin-key.del{font-size:16px;color:var(--text-dim);}
.pin-error{color:var(--err);font-size:13px;height:18px;}
#app{display:none;flex-direction:column;height:100vh;max-width:600px;margin:0 auto;}
#app.visible{display:flex;}
.nexus-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);flex-shrink:0;}
.brand{display:flex;align-items:center;gap:10px;}
.mark{width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;}
.mark-dot{width:9px;height:9px;border-radius:50%;background:var(--bg);}
.brand-name{font-family:'Source Serif 4',serif;font-weight:600;font-size:18px;}
.header-right{display:flex;align-items:center;gap:10px;}
.voice-state{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);}
.vdot{width:6px;height:6px;border-radius:50%;background:#9AC18A;}
.vdot.off{background:var(--text-dim);}
.status-bar{display:flex;gap:8px;padding:6px 16px;background:var(--surface);border-bottom:1px solid var(--line);flex-shrink:0;flex-wrap:wrap;}
.status-pill{font-size:11px;padding:3px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-weight:500;display:flex;align-items:center;gap:4px;cursor:pointer;}
.status-pill.off{background:var(--surface-2);color:var(--text-dim);}
.thread{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:14px;}
.row{display:flex;}
.row.user{justify-content:flex-end;}
.row.bot{justify-content:flex-start;}
.bubble{max-width:82%;padding:11px 14px;border-radius:16px;font-size:14.5px;line-height:1.5;position:relative;}
.row.user .bubble{background:var(--bubble-user);color:var(--on-accent, #fff);border-bottom-right-radius:4px;}
.row.bot .bubble{background:var(--bubble-bot);border:1px solid var(--line);border-bottom-left-radius:4px;}
.pin-btn{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--text-dim);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.5;padding:0;line-height:1;}
.pin-btn.pinned{opacity:1;background:var(--accent);color:#fff;border-color:var(--accent);}
.followups{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
.followup-chip{font-size:12px;padding:6px 11px;border-radius:999px;background:var(--surface-2);color:var(--text);border:1px solid var(--line);cursor:pointer;}
.history-item-export{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--text-dim);flex-shrink:0;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.history-item-export:active{background:var(--accent-soft);color:var(--accent);}
.history-tabs{display:flex;gap:8px;padding:0 16px 4px;}
.history-tab{flex:1;padding:8px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;}
.history-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.pin-item-role{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:1px;}
.tag{display:inline-block;margin-top:6px;font-size:11px;background:var(--accent-soft);color:var(--accent);padding:2px 8px;border-radius:999px;font-weight:500;}
.tag.err{background:var(--err-soft);color:var(--err);}
.tag.green{background:var(--good-soft);color:var(--good);}
.typing{display:flex;gap:4px;padding:4px 2px;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:bounce 1s infinite ease-in-out;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
.empty-state{margin:auto 0;text-align:center;padding:0 24px;}
.empty-state h1{font-family:'Source Serif 4',serif;font-size:22px;font-weight:600;margin-bottom:6px;}
.empty-state p{color:var(--text-dim);font-size:14px;}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:18px;}
.sugg{background:var(--surface);border:1px solid var(--line);color:var(--text);font-size:13px;padding:8px 13px;border-radius:999px;cursor:pointer;font-family:'Inter',sans-serif;}
.sugg:active{border-color:var(--accent);}
.composer{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:var(--bg);flex-shrink:0;}
.mic-btn{width:42px;height:42px;border-radius:50%;flex-shrink:0;border:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.mic-btn.listening{background:var(--accent);border-color:var(--accent);}
.mic-btn.listening::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid var(--accent);opacity:.5;animation:pulse 1.2s infinite;}
@keyframes pulse{0%{transform:scale(.9);opacity:.6}100%{transform:scale(1.35);opacity:0}}
.input-wrap{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:4px 6px 4px 16px;display:flex;align-items:center;gap:6px;}
.text-input{flex:1;border:none;outline:none;background:transparent;font-family:'Inter',sans-serif;font-size:14.5px;color:var(--text);padding:9px 0;}
.send-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.send-btn:disabled{opacity:.35;}
.ai-body{font-size:14px;line-height:1.6;}
.ai-body p{margin:0 0 6px;}
.ai-body p:last-child{margin-bottom:0;}
.ai-body strong{font-weight:600;}
.ai-body ul,.ai-body ol{padding-left:18px;margin:4px 0 6px;}
.ai-body li{margin-bottom:2px;}
.ai-body code{font-family:monospace;font-size:12.5px;background:var(--code-bg);border:1px solid var(--line);padding:1px 5px;border-radius:4px;}
.ai-body pre{background:var(--code-bg);border:1px solid var(--line);border-radius:8px;padding:10px;margin:6px 0;overflow-x:auto;}
.ai-body pre code{background:none;border:none;}
.ai-body h3{font-family:'Source Serif 4',serif;font-size:15px;font-weight:600;margin:8px 0 3px;}
.yt-player{margin-top:8px;border-radius:10px;overflow:hidden;background:#000;aspect-ratio:16/9;width:100%;}
.yt-player iframe{width:100%;height:100%;border:none;display:block;}
.camera-preview{margin-top:8px;border-radius:10px;overflow:hidden;width:100%;max-height:260px;object-fit:cover;display:block;}
.map-frame{margin-top:8px;border-radius:10px;overflow:hidden;width:100%;height:220px;border:none;display:block;}
.action-btn{display:inline-block;margin-top:8px;margin-right:6px;padding:8px 14px;border-radius:999px;background:var(--accent);color:#fff;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:'Inter',sans-serif;}
.action-btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent);}
#historyScreen{position:fixed;inset:0;background:var(--bg);z-index:998;display:none;flex-direction:column;}
#historyScreen.visible{display:flex;}
.history-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);flex-shrink:0;}
.history-header h2{font-family:'Source Serif 4',serif;font-size:18px;font-weight:600;}
.history-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--surface-2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:17px;line-height:1;}
.history-new{margin:12px 16px 4px;padding:11px;border-radius:12px;background:var(--accent);color:#fff;border:none;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
.history-list{flex:1;overflow-y:auto;padding:10px 12px 20px;}
.history-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;margin-bottom:8px;background:var(--surface);border:1px solid var(--line);cursor:pointer;}
.history-item.active{border-color:var(--accent);}
.history-item-body{flex:1;min-width:0;}
.history-item-title{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.history-item-meta{font-size:12px;color:var(--text-dim);margin-top:2px;}
.history-item-del{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--text-dim);flex-shrink:0;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.history-item-del:active{background:var(--err-soft);color:var(--err);}
.history-empty{text-align:center;color:var(--text-dim);font-size:14px;margin-top:60px;padding:0 24px;}
</style>
</head>
<body>

<div id="pinScreen">
  <div class="pin-logo"><div class="pin-dot-inner"></div></div>
  <div class="pin-title">Nexus</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    <div class="pin-dot" id="d4"></div><div class="pin-dot" id="d5"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key del" onclick="pinDel()">&#9003;</button>
    <button class="pin-key" onclick="pinPress('0')">0</button>
    <button class="pin-key" onclick="pinSubmit()">&#8629;</button>
  </div>
  <div class="pin-error" id="pinError"></div>
</div>

<div id="app">
  <header class="nexus-header">
    <div class="brand">
      <div class="mark"><div class="mark-dot"></div></div>
      <div class="brand-name">Nexus</div>
    </div>

<script>
const CORRECT_PIN = '123456';
const GEMINI_PROXY_URL = '/api/gemini'; // backend proxy holds the real key server-side

// ── THEME ────────────────────────────────────────────────────────────────────
const THEME_KEY = 'nexus_theme';
function getBgFor(theme){return theme==='dark'?'#1C1A17':'#F7F4EE';}
function applyTheme(theme){
  document.getElementById('htmlRoot').setAttribute('data-theme', theme);
  document.getElementById('htmlRoot').style.background = getBgFor(theme);
  document.body.style.background = getBgFor(theme);
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', getBgFor(theme));
  const btn = document.getElementById('themeBtn');
  if(btn) btn.innerHTML = theme==='dark' ? '&#9728;&#65039;' : '&#127769;';
}
function toggleTheme(){
  const current = document.getElementById('htmlRoot').getAttribute('data-theme') || 'light';
  const next = current==='dark' ? 'light' : 'dark';
  try{localStorage.setItem(THEME_KEY, next);}catch(e){}
  applyTheme(next);
}
(function initTheme(){
  let saved=null;
  try{saved=localStorage.getItem(THEME_KEY);}catch(e){}
  const theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(theme);
})();

// ── HAPTICS ──────────────────────────────────────────────────────────────────
// Short, subtle buzzes on system actions (button taps, toggles, completions).
// Silently no-ops on devices/browsers without the Vibration API.
function tick(ms){
  if('vibrate' in navigator){try{navigator.vibrate(ms||12);}catch(e){}}
}

// ── TEXT-TO-SPEECH ───────────────────────────────────────────────────────────
const TTS_KEY='nexus_tts';
let ttsEnabled=false;
let ttsVoice=null;
function loadVoice(){
  if(!('speechSynthesis' in window))return;
  const voices=speechSynthesis.getVoices();
  ttsVoice=voices.find(v=>/en/i.test(v.lang))||voices[0]||null;
}
if('speechSynthesis' in window){
  loadVoice();
  speechSynthesis.onvoiceschanged=loadVoice;
}
function applyTTSButton(){
  const btn=document.getElementById('ttsBtn');
  if(!btn)return;
  btn.innerHTML = ttsEnabled ? '&#128266;' : '&#128264;';
  btn.classList.toggle('off', !ttsEnabled);
}
function toggleTTS(){
  ttsEnabled=!ttsEnabled;
  try{localStorage.setItem(TTS_KEY, ttsEnabled?'1':'0');}catch(e){}
  applyTTSButton();
  tick(12);
  if(!ttsEnabled && 'speechSynthesis' in window) speechSynthesis.cancel();
  else if(ttsEnabled) speak('Voice responses on.');
}
(function initTTS(){
  let saved=null;
  try{saved=localStorage.getItem(TTS_KEY);}catch(e){}
  ttsEnabled = saved==='1';
  applyTTSButton();
})();
// Strips markdown/HTML so raw AI text reads naturally aloud.
function cleanForSpeech(text){
  return String(text)
    .replace(/```[\s\S]*?```/g,'code block omitted')
    .replace(/`([^`]+)`/g,'$1')
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1')
    .replace(/#{1,6}\s*/g,'')
    .replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1')
    .trim();
}
function speak(text){
  if(!ttsEnabled || !('speechSynthesis' in window))return;
  const clean=cleanForSpeech(text);
  if(!clean)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(clean);
  if(ttsVoice)u.voice=ttsVoice;
  u.rate=1;u.pitch=1;
  speechSynthesis.speak(u);
}

// ── PIN ──────────────────────────────────────────────────────────────────────
let pinEntry = '';
function pinPress(d){if(pinEntry.length>=6)return;pinEntry+=d;updateDots();if(pinEntry.length===6)setTimeout(pinSubmit,120);}
function pinDel(){pinEntry=pinEntry.slice(0,-1);updateDots();}
function updateDots(){for(let i=0;i<6;i++)document.getElementById('d'+i).classList.toggle('filled',i<pinEntry.length);}
function pinSubmit(){
  if(pinEntry===CORRECT_PIN){
    document.getElementById('pinScreen').style.display='none';
    document.getElementById('app').classList.add('visible');
    initVoice(); initBattery(); restoreChatLog(); restoreTimers();
  }else{
    document.getElementById('pinError').textContent='Wrong pin, try again';
    pinEntry='';updateDots();
    setTimeout(()=>document.getElementById('pinError').textContent='',1800);
  }
}

// ── APPS ──────────────────────────────────────────────────────────────────────
const APPS = {
  spotify:   {a:['spotify'],          o:'https://open.spotify.com',          s:q=>'https://open.spotify.com/search/'+encodeURIComponent(q)},
  youtube:   {a:['youtube','yt'],     o:'https://www.youtube.com',           s:q=>'https://www.youtube.com/results?search_query='+encodeURIComponent(q)},
  whatsapp:  {a:['whatsapp'],         o:'https://wa.me/',                    s:null},
  instagram: {a:['instagram','insta'],o:'https://www.instagram.com',         s:q=>'https://www.instagram.com/explore/search/keyword/?q='+encodeURIComponent(q)},
  maps:      {a:['maps','google maps'],o:'https://maps.google.com',          s:q=>'https://www.google.com/maps/search/'+encodeURIComponent(q)},
  twitter:   {a:['twitter','x'],      o:'https://twitter.com',               s:q=>'https://twitter.com/search?q='+encodeURIComponent(q)},
  gmail:     {a:['gmail','email'],    o:'https://mail.google.com',           s:null},
  amazon:    {a:['amazon'],           o:'https://www.amazon.com',            s:q=>'https://www.amazon.com/s?k='+encodeURIComponent(q)},
  netflix:   {a:['netflix'],          o:'https://www.netflix.com',           s:q=>'https://www.netflix.com/search?q='+encodeURIComponent(q)},
  tiktok:    {a:['tiktok'],           o:'https://www.tiktok.com',            s:q=>'https://www.tiktok.com/search?q='+encodeURIComponent(q)},

  discord:   {a:['discord'],          o:'https://discord.com/app',           s:null},
  google:    {a:['google'],           o:'https://www.google.com',            s:q=>'https://www.google.com/search?q='+encodeURIComponent(q)},
  chrome:    {a:['chrome','browser'], o:'https://www.google.com',            s:q=>'https://www.google.com/search?q='+encodeURIComponent(q)},
  facebook:  {a:['facebook','fb'],    o:'https://www.facebook.com',          s:q=>'https://www.facebook.com/search/top/?q='+encodeURIComponent(q)},

  clock:     {a:['clock','alarm'],    o:'intent://com.android.clock#Intent;scheme=android-app;end', s:null},
  settings:  {a:['settings'],         o:'intent://settings#Intent;scheme=android-app;end', s:null},
  calculator:{a:['calculator','calc'],o:'intent://com.android.calculator2#Intent;scheme=android-app;end',s:null},
};
function findApp(name){name=name.trim().toLowerCase();for(const k in APPS){if(APPS[k].a.includes(name))return APPS[k];}for(const k in APPS){if(APPS[k].a.some(a=>name.includes(a)))return APPS[k];}return null;}

// ── YOUTUBE ───────────────────────────────────────────────────────────────────
function extractYTVideoId(t){const m=t.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([\w-]{11})/i);return m?m[1]:null;}
function extractYTURL(t){const m=t.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)[\w-]+(?:[?&][\w=&-]*)?/i);return m?(m[0].startsWith('http')?m[0]:'https://'+m[0]):null;}

// ── INTENT DETECTION ──────────────────────────────────────────────────────────
function detectIntent(raw){
  const text=raw.trim().replace(/[.?!]+$/,'');
  const low=text.toLowerCase();
  let m;

  // YouTube URL
  const ytUrl=extractYTURL(raw);
  if(ytUrl){const vid=extractYTVideoId(ytUrl);if(vid)return{type:'yt_play',videoId:vid};}

  // YouTube subscriptions / unsubscribe
  if(/\b(?:my\s+)?subscriptions?\b/.test(low)&&/youtube|\byt\b/.test(low)&&!/unsubscribe/.test(low))
    return{type:'yt_subscriptions'};
  if(m=low.match(/^unsubscribe\s+(?:from\s+)?(.+?)(?:\s+on\s+(?:youtube|yt))?$/))
    return{type:'yt_unsubscribe',channel:m[1].trim()};

  // YouTube search
  if(/\b(?:download|watch|play)\b/.test(low)&&/youtube|youtu\.be|\byt\b/.test(low))
    return{type:'app_search',app:'youtube',query:low.replace(/\b(?:download|watch|play|on youtube|on yt)\b/g,'').trim()};

  // Phone
  if(m=low.match(/^call\s+(.+)$/))return{type:'call',target:m[1]};
  if(/^call$/.test(low))return{type:'call_prompt'};
  if(m=low.match(/^(?:text|message|sms)\s+(.+)$/))return{type:'sms',target:m[1]};

  // Email
  if(m=low.match(/^(?:email|mail)\s+(.+)$/))return{type:'email',target:m[1]};

  // Memory — facts that persist across every future chat, not just this session
  if(m=low.match(/^what do you remember(?:\s+about\s+me)?\??$/))return{type:'recall_memory'};
  if(m=low.match(/^forget\s+(?:that\s+)?(.+)$/))return{type:'forget',fact:m[1]};
  if(m=low.match(/^remember\s+(?:that\s+)?(.+)$/))return{type:'remember',fact:m[1]};

  // Timer / Alarm
  if(m=low.match(/^set\s+(?:a\s+)?timer\s+(?:for\s+)?(.+)$/))return{type:'timer',duration:m[1]};
  if(m=low.match(/^(?:set\s+(?:an?\s+)?)?alarm\s+(?:for\s+|at\s+)?(.+)$/))return{type:'alarm',time:m[1]};

  // Reminders — like alarms, but with a note and a flexible date, not just a clock time
  if(m=low.match(/^(?:remind me to|set a reminder to|set a reminder for)\s+(.+?)(?:\s+(tomorrow.*|today.*|on\s+\w+.*|at\s+\d.*|in\s+\d+.*))$/))
    return{type:'reminder',note:m[1].trim(),when:m[2].trim()};
  if(m=low.match(/^(?:remind me to|set a reminder to|set a reminder for)\s+(.+)$/))
    return{type:'reminder',note:m[1].trim(),when:null};

  // Weather
  if(m=low.match(/^(?:what'?s the |what is the |check )?weather\s+(?:in|for|at)\s+(.+)$/))return{type:'weather',place:m[1].trim()};
  if(m=low.match(/^how'?s the weather(?:\s+in\s+(.+))?\??$/))return{type:'weather',place:m[1]?m[1].trim():null};
  if(/^(?:what'?s the |what is the )?weather(?:\s+(?:today|now|right now|outside))?\??$/.test(low))return{type:'weather',place:null};

  // Image generation
  if(m=low.match(/^(?:generate|create|draw|make|imagine)\s+(?:an?\s+)?(?:image|picture|photo|drawing|illustration)\s+(?:of\s+)?(.+)$/))
    return{type:'image_gen',prompt:m[1].trim()};

  // Location
  if(/\b(?:where am i|my location|my address|current location|find me|what'?s? my location)\b/.test(low))return{type:'location'};
  if(m=low.match(/^(?:navigate|directions?|take me|get me)\s+(?:to\s+)?(.+)$/))return{type:'navigate',dest:m[1]};
  if(m=low.match(/^(?:find|search|look\s*up)\s+(.+?)\s+(?:near(?:\s+me)?|nearby|close\s+by)$/))return{type:'nearby',query:m[1]};

  // Camera / Photo
  if(/\b(?:take\s+(?:a\s+)?photo|open\s+camera|camera|selfie|take\s+(?:a\s+)?picture|scan)\b/.test(low))return{type:'camera'};

  // Share
  if(/\b(?:share\s+(?:this|page|link)|share)\b/.test(low))return{type:'share'};

  // Clipboard
  if(m=low.match(/^copy\s+(?:this\s+)?["']?(.+?)["']?\s+to\s+clipboard$/))return{type:'copy',text:m[1]};
  if(m=low.match(/^copy\s+["']?(.+?)["']?$/))return{type:'copy',text:m[1]};

  // Vibrate
  if(/\b(?:vibrate|buzz)\b/.test(low))return{type:'vibrate'};

  // Battery
  if(/\b(?:battery|power\s+level|charge)\b/.test(low))return{type:'battery'};

  // Torch / Flashlight
  if(/\b(?:torch|flashlight|flash|light)\b/.test(low))return{type:'torch'};

  // Fullscreen
  if(/\b(?:full\s*screen|fullscreen)\b/.test(low))return{type:'fullscreen'};

  // Web search — only trigger Google when explicitly asked for it; everything
  // else (bare "search X" / "find X" / "look up X") falls through to the AI below.
  if(/^(?:search\s+google|google\s+search|search\s+the\s+web|search\s+online)$/.test(low))return{type:'search_prompt'};
  if(m=low.match(/^google\s+(.+)$/))return{type:'app_search',app:'google',query:m[1]};
  if(m=low.match(/^search\s+google\s+for\s+(.+)$/))return{type:'app_search',app:'google',query:m[1]};
  if(m=low.match(/^(?:search|look\s*up|find)\s+(?:for\s+)?(.+?)\s+on\s+google$/))return{type:'app_search',app:'google',query:m[1]};

  // GitHub search — handles "github X", "search github for X", "find X repos(itories) [on github]"
  if(m=low.match(/^(?:github|gh)\s+(?:search\s+(?:for\s+)?)?(.+)$/))
    return{type:'app_search',app:'github',query:m[1].trim()};
  if(m=low.match(/^(?:search|find|look\s*up)\s+(?:for\s+)?(.+?)\s+repos?(?:itor(?:y|ies))?(?:\s+on\s+github)?$/))
    return{type:'app_search',app:'github',query:m[1].trim()};

  // Open app + search
  if(m=low.match(/^open\s+(?:the\s+)?([a-z0-9 ]+?)\s+and\s+(?:search(?:\s+for)?|play|look\s*up|find)\s+(.+)$/))return{type:'app_search',app:m[1],query:m[2]};
  if(m=low.match(/^(?:search(?:\s+for)?|play|look\s*up|find)\s+(.+?)\s+(?:on|in)\s+([a-z0-9 ]+)$/))return{type:'app_search',app:m[2],query:m[1]};
  if(m=low.match(/^open\s+(?:the\s+)?([a-z0-9 ]+)$/))return{type:'app_open',app:m[1]};

  return{type:'ai',question:text};
}

// ── DEVICE FEATURES ───────────────────────────────────────────────────────────
let userLat=null, userLon=null;

function requestLocation(){
  const pill=document.getElementById('pillLoc');
  if(userLat!==null){
    // Toggle off
    userLat=null; userLon=null;
    pill.className='status-pill off';
    pill.textContent='📍 Location';
    return;
  }
  pill.textContent='...';
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude; userLon=pos.coords.longitude;
    pill.className='status-pill';
    pill.textContent='GPS on ✓';
  },()=>{pill.className='status-pill off';pill.textContent='📍 Location';});
}

function getLocationAndRespond(rowId){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude; userLon=pos.coords.longitude;
    const url='https://nominatim.openstreetmap.org/reverse?format=json&lat='+userLat+'&lon='+userLon;
    fetch(url,{headers:{'Accept-Language':'en'}})
      .then(r=>r.json())
      .then(d=>{
        const addr=d.display_name||('Lat: '+userLat.toFixed(5)+', Lon: '+userLon.toFixed(5));
        const mapUrl='https://maps.google.com/?q='+userLat+','+userLon;
        setRow(rowId,
          '<div class="ai-body"><p><strong>You are here:</strong><br>'+esc(addr)+'</p></div>'+
          '<iframe class="map-frame" src="https://www.openstreetmap.org/export/embed.html?bbox='+(userLon-0.01)+','+(userLat-0.01)+','+(userLon+0.01)+','+(userLat+0.01)+'&layer=mapnik&marker='+userLat+','+userLon+'" loading="lazy"></iframe>'+
          '<br><button class="action-btn" onclick="window.open(\''+mapUrl+'\',\'_blank\')">Open in Google Maps</button>'+
          '<span class="tag green">GPS</span>'
        );
        document.getElementById('pillLoc').className='status-pill';
        document.getElementById('pillLoc').textContent='GPS on';
      }).catch(()=>{
        setRow(rowId,'<div class="ai-body"><p>Lat: '+userLat.toFixed(5)+', Lon: '+userLon.toFixed(5)+'</p></div><span class="tag green">GPS</span>');
      });
  },err=>{
    setRow(rowId,'Could not get location. Please allow location permission in your browser.<br><span class="tag err">Location denied</span>');
  });
}

function navigateTo(dest, rowId){
  const url='https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(dest)+(userLat?'&origin='+userLat+','+userLon:'');
  setRow(rowId,'Navigating to <strong>'+esc(dest)+'</strong>.<br><button class="action-btn" onclick="window.open(\''+url+'\',\'_blank\')">Open Google Maps</button><span class="tag green">Maps</span>');
}

function searchNearby(query, rowId){
  const q=query+(userLat?' near '+userLat.toFixed(4)+','+userLon.toFixed(4):'near me');
  const url='https://www.google.com/maps/search/'+encodeURIComponent(q);
  setRow(rowId,'Searching for <strong>'+esc(query)+'</strong> nearby.<br><button class="action-btn" onclick="window.open(\''+url+'\',\'_blank\')">Open in Maps</button><span class="tag green">Nearby</span>');
  setTimeout(()=>window.open(url,'_blank'),900);
}

function doVibrate(rowId){
  if('vibrate' in navigator){
    const ok=navigator.vibrate([300,100,300,100,300]);
    if(ok){setRow(rowId,'Vibrating! <span class="tag green">Done</span>');}
    else{setRow(rowId,'Vibration blocked or unavailable on this device/browser.<span class="tag err">Unavailable</span>');}
  } else {
    setRow(rowId,'Vibration API not supported on this browser.<span class="tag err">Unavailable</span>');
  }
}

async function getBattery(rowId){
  const pill=document.getElementById('pillBat');
  if(navigator.getBattery){
    const bat=await navigator.getBattery();
    const pct=Math.round(bat.level*100);
    const charging=bat.charging?' (charging)':' (not charging)';
    pill.className='status-pill';
    pill.textContent='Bat: '+pct+'%';
    setRow(rowId,'Battery is at <strong>'+pct+'%</strong>'+charging+'.<span class="tag green">Battery</span>');
  } else {
    setRow(rowId,'Battery API not available on this browser.<span class="tag err">Unavailable</span>');
  }
}

async function initBattery(){
  if(navigator.getBattery){
    const bat=await navigator.getBattery();
    const pill=document.getElementById('pillBat');
    const update=()=>{
      const pct=Math.round(bat.level*100);
      pill.className='status-pill';
      pill.textContent='Bat: '+pct+'%';
    };
    update();
    bat.addEventListener('levelchange',update);
    bat.addEventListener('chargingchange',update);
  }
}

// ── TIMERS & ALARMS (persisted across reload, live countdown pill) ────────────
const TIMERS_KEY='nexus_timers';
let activeTimers=[]; // [{id,label,endTime,type:'timer'|'alarm'|'reminder'}]
let timerTickHandle=null;
const WEEKDAYS=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];

function parseDurationMs(durationStr){
  let ms=0;
  const h=durationStr.match(/(\d+)\s*h/i); if(h) ms+=parseInt(h[1])*3600000;
  const min=durationStr.match(/(\d+)\s*m/i); if(min) ms+=parseInt(min[1])*60000;
  const sec=durationStr.match(/(\d+)\s*s/i); if(sec) ms+=parseInt(sec[1])*1000;
  if(!ms){ // bare number with no unit, e.g. "5" → assume minutes
    const bare=durationStr.match(/^\s*(\d+)\s*$/);
    if(bare) ms=parseInt(bare[1])*60000;
  }
  return ms;
}

// Parses clock times like "5:30 pm", "17:30", "7am" into the next future Date.
function parseClockTime(timeStr){
  const s=timeStr.trim().toLowerCase();
  let m=s.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)?$/);
  if(!m)return null;
  let hr=parseInt(m[1],10),min=m[2]?parseInt(m[2],10):0;const ap=m[3];
  if(ap==='pm'&&hr<12)hr+=12;
  if(ap==='am'&&hr===12)hr=0;
  if(hr>23||min>59)return null;
  const now=new Date();
  const target=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hr,min,0,0);
  if(target<=now)target.setDate(target.getDate()+1); // next occurrence
  return target;
}

// Parses reminder phrasing: "tomorrow at 3pm", "in 20 minutes", "on friday", "at 5pm", "today".
// Falls back to 9am on the target day when no clock time is given.
function parseReminderWhen(str){
  const s=str.trim().toLowerCase();
  const now=new Date();
  let m=s.match(/^in\s+(\d+)\s*(day|days|hour|hours|hr|hrs|h|minute|minutes|min|mins|m)$/);
  if(m){
    const n=parseInt(m[1],10),unit=m[2];
    const ms=/^d/.test(unit)?n*86400000:/^h/.test(unit)?n*3600000:n*60000;
    return new Date(now.getTime()+ms);
  }
  let hr=null,min=0;
  const tm=s.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)/);
  if(tm){
    hr=parseInt(tm[1],10);min=tm[2]?parseInt(tm[2],10):0;
    if(tm[3]==='pm'&&hr<12)hr+=12;
    if(tm[3]==='am'&&hr===12)hr=0;
  }
  let dayOffset=null;
  if(/\btomorrow\b/.test(s))dayOffset=1;
  else if(/\btoday\b/.test(s))dayOffset=0;
  else{
    for(let i=0;i<WEEKDAYS.length;i++){
      if(s.indexOf(WEEKDAYS[i])!==-1){let diff=(i-now.getDay()+7)%7;if(diff===0)diff=7;dayOffset=diff;break;}
    }
  }
  if(dayOffset===null&&hr===null)return parseClockTime(str); // bare time like alarm
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if(dayOffset!==null)base.setDate(base.getDate()+dayOffset);
  base.setHours(hr!==null?hr:9,hr!==null?min:0,0,0);
  if(dayOffset===null&&base<=now)base.setDate(base.getDate()+1);
  return base;
}

function saveTimers(){try{localStorage.setItem(TIMERS_KEY,JSON.stringify(activeTimers));}catch(e){}}
function kindLabel(type){return type==='alarm'?'Alarm':type==='reminder'?'Reminder':'Timer';}

function notifyDone(label,kind){
  if(typeof Notification!=='undefined'&&Notification.permission==='granted'){
    new Notification('Nexus '+kind,{body:kind==='Reminder'?label:label+' is done!'});
  }
  if(navigator.vibrate)navigator.vibrate([300,100,300]);
  addRow('bot',kind==='Reminder'
    ?'Reminder: <strong>'+esc(label)+'</strong> <span class="tag green">Reminder</span>'
    :'Your <strong>'+esc(label)+'</strong> '+kind.toLowerCase()+' is up! <span class="tag green">Done</span>');
}

function scheduleTimer(t){
  const ms=t.endTime-Date.now();
  if(ms<=0){notifyDone(t.label,kindLabel(t.type));removeTimer(t.id);return;}
  setTimeout(()=>{
    if(activeTimers.find(x=>x.id===t.id)){notifyDone(t.label,kindLabel(t.type));removeTimer(t.id);}
  },ms);
}

function removeTimer(id){
  activeTimers=activeTimers.filter(t=>t.id!==id);
  saveTimers();
  updateTimerPill();
}

function updateTimerPill(){
  const pill=document.getElementById('pillTimer');
  if(!activeTimers.length){pill.style.display='none';if(timerTickHandle){clearInterval(timerTickHandle);timerTickHandle=null;}return;}
  pill.style.display='flex';pill.className='status-pill';
  const tick=()=>{
    // show the soonest-finishing active timer/alarm/reminder
    const soonest=[...activeTimers].sort((a,b)=>a.endTime-b.endTime)[0];
    if(!soonest)return;
    const remain=Math.max(0,soonest.endTime-Date.now());
    const hh=Math.floor(remain/3600000),mm=Math.floor((remain%3600000)/60000),ss=Math.floor((remain%60000)/1000);
    const icon=soonest.type==='alarm'?'\u23F0 ':soonest.type==='reminder'?'\uD83D\uDD14 ':'\u23F1 ';
    const label=icon+(hh?hh+':'+String(mm).padStart(2,'0'):mm+':'+String(ss).padStart(2,'0'));
    pill.textContent=label+(activeTimers.length>1?' +'+(activeTimers.length-1):'');
  };
  tick();
  if(!timerTickHandle)timerTickHandle=setInterval(tick,1000);
  pill.onclick=()=>{
    if(activeTimers.length&&confirm('Cancel '+(activeTimers.length>1?'all timers/alarms':activeTimers[0].label+'?'))){
      activeTimers=[];saveTimers();updateTimerPill();
    }
  };
}

function restoreTimers(){
  let saved=[];
  try{saved=JSON.parse(localStorage.getItem(TIMERS_KEY)||'[]');}catch(e){saved=[];}
  activeTimers=saved.filter(t=>t.endTime>Date.now()); // drop ones that already passed while app was closed
  const missed=saved.filter(t=>t.endTime<=Date.now());
  missed.forEach(t=>notifyDone(t.label,kindLabel(t.type)));
  saveTimers();
  activeTimers.forEach(scheduleTimer);
  updateTimerPill();
}

function setReminder(note,whenStr,rowId){
  const target=whenStr?parseReminderWhen(whenStr):null;
  if(!target){
    setRow(rowId,'When should I remind you to <strong>'+esc(note)+'</strong>? Try "tomorrow at 3pm", "in 20 minutes", or "on friday".<span class="tag">Reminder</span>');
    return;
  }
  const id='r'+Date.now();
  activeTimers.push({id,label:note,endTime:target.getTime(),type:'reminder'});saveTimers();scheduleTimer({id,label:note,endTime:target.getTime(),type:'reminder'});updateTimerPill();
  const when=target.toLocaleString([],{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  setRow(rowId,'Got it — I\'ll remind you to <strong>'+esc(note)+'</strong> on '+esc(when)+'. This stays saved even if you close the app, as long as you reopen it after that time.<span class="tag green">Reminder</span>');
  if(typeof Notification!=='undefined'&&Notification.permission==='default')Notification.requestPermission();
}

function setTimer(durationStr, rowId){
  const ms=parseDurationMs(durationStr);
  if(!ms){setRow(rowId,"Couldn't understand that duration. Try '5 minutes' or '30 seconds'.<span class='tag err'>Error</span>");return;}
  const label=durationStr.trim();
  const id='t'+Date.now();
  const endTime=Date.now()+ms;
  activeTimers.push({id,label,endTime,type:'timer'});saveTimers();scheduleTimer({id,label,endTime,type:'timer'});updateTimerPill();
  setRow(rowId,'Timer set for <strong>'+esc(label)+'</strong>. I\'ll notify you when it\'s done — even if you reopen the app later.<span class="tag green">Timer</span>');
  if(typeof Notification!=='undefined'&&Notification.permission==='default')Notification.requestPermission();
}

function setAlarm(timeStr, rowId){
  const target=parseClockTime(timeStr);
  if(!target){
    const clockUrl='https://www.google.com/search?q=set+alarm+for+'+encodeURIComponent(timeStr);
    setRow(rowId,
      'Couldn\'t parse "'+esc(timeStr)+'" as a time (try e.g. "7:30 am"). You can set it via your clock app instead:<br>'+
      '<button class="action-btn" onclick="window.open(\''+clockUrl+'\',\'_blank\')">Set Alarm via Google</button>'+
      '<span class="tag err">Couldn\'t parse</span>'
    );
    return;
  }
  const id='a'+Date.now();
  const label=target.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  activeTimers.push({id,label,endTime:target.getTime(),type:'alarm'});saveTimers();scheduleTimer({id,label,endTime:target.getTime(),type:'alarm'});updateTimerPill();
  setRow(rowId,'Alarm set for <strong>'+esc(label)+'</strong>. I\'ll notify you here when it goes off.<span class="tag green">Alarm</span>');
  if(typeof Notification!=='undefined'&&Notification.permission==='default')Notification.requestPermission();
}

function openCamera(){

let capturedImageData=null;
function handleFileCapture(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    capturedImageData=ev.target.result;
    const tid=typingRow();
    setRow(tid,
      '<img src="'+capturedImageData+'" class="camera-preview" alt="Captured photo">'+
      '<br><button class="action-btn" onclick="analyzeImage()">Analyze with AI</button>'+
      '<button class="action-btn ghost" onclick="shareImage()">Share</button>'+
      '<span class="tag green">Photo</span>'
    );
  };
  reader.readAsDataURL(file);
}

async function analyzeImage(){
  if(!capturedImageData)return;
  const tid=typingRow();
  const base64=capturedImageData.split(',')[1];
  const mime=capturedImageData.split(';')[0].split(':')[1];
  conversationHistory.push({role:'user',parts:[{inline_data:{mime_type:mime,data:base64}},{text:'Describe what you see in this image in detail.'}]});
  try{
    const res=await fetch(GEMINI_PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:conversationHistory})});
    const data=await res.json();
    const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||"Couldn't analyse image.";
    conversationHistory.push({role:'model',parts:[{text:text}]});
    setRow(tid,'<div class="ai-body">'+mdToHtml(text)+'</div><span class="tag green">Vision</span>');
  }catch(e){conversationHistory.pop();setRow(tid,'Error analysing image.<span class="tag err">Error</span>');}
}

function shareImage(){
  if(!capturedImageData)return;
  fetch(capturedImageData).then(r=>r.blob()).then(blob=>{
    const file=new File([blob],'nexus-photo.jpg',{type:blob.type});
    if(navigator.share&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'Photo from Nexus'});
    } else {alert('Sharing files not supported on this browser.');}
  });
}

function doShare(rowId){

let torchOn=false, torchStream=null;
async function doTorch(rowId){
  try{

// ── MARKDOWN ──────────────────────────────────────────────────────────────────
function mdToHtml(md){
  return md
    .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^#{2,3} (.+)$/gm,'<h3>$1</h3>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]+?<\/li>)/g,s=>'<ul>'+s+'</ul>')
    .split('\n\n').map(p=>p.startsWith('<')?p:'<p>'+p.trim()+'</p>').join('');
}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// ── CHAT UI / SESSION HISTORY ───────────────────────────────────────────────
let msgCount=0;
const CHAT_KEY='nexus_chat_log';           // legacy single-thread key, migrated on first load
const SESSIONS_KEY='nexus_sessions';       // [{id,title,updatedAt,messages:[{id,role,inner}]}]
const CURRENT_SESSION_KEY='nexus_current_session';
let chatLog=[];          // messages of the active session
let currentSessionId=null;
const EMPTY_STATE_HTML='<div class="empty-state" id="emptyState"><h1>What do you need?</h1><p>Your AI assistant &mdash; talk, type, or tap a suggestion.</p><div class="suggestions">'+
    '<div class="sugg" onclick="respond(\'Where am I?\')">Where am I?</div>'+
    '<div class="sugg" onclick="respond(\'open spotify\')">open spotify</div>'+
    '<div class="sugg" onclick="respond(\'set a timer for 10 minutes\')">set a timer</div>'+
    '<div class="sugg" onclick="respond(\'take a photo\')">take a photo</div>'+
    '<div class="sugg" onclick="respond(\'search google\')">search google</div>'+
    '<div class="sugg" onclick="respond(\'call\')">make a call</div></div></div>';

function newSessionId(){return 's'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function stripHtml(html){
  const tmp=document.createElement('div');
  tmp.innerHTML=String(html);
  tmp.querySelectorAll('.followups').forEach(e=>e.remove());
  return (tmp.textContent||'').replace(/\s+/g,' ').trim();
}
function sessionTitle(messages){
  const firstUser=messages.find(m=>m.role==='user');
  if(!firstUser)return 'New chat';
  const text=stripHtml(firstUser.inner);
  return text ? (text.length>42?text.slice(0,42)+'…':text) : 'New chat';
}
function loadSessions(){try{return JSON.parse(localStorage.getItem(SESSIONS_KEY)||'[]');}catch(e){return [];}}
function saveSessions(sessions){try{localStorage.setItem(SESSIONS_KEY,JSON.stringify(sessions));}catch(e){/* storage unavailable/full — fail silently */}}

function saveChatLog(){
  try{
    // don't persist a dangling "typing…" bubble — it'll never resolve after reload
    const clean=chatLog.filter(m=>!m.inner.includes('class="typing"'));
    if(!clean.length)return;
    const sessions=loadSessions();
    const idx=sessions.findIndex(s=>s.id===currentSessionId);
    const data={id:currentSessionId,title:sessionTitle(clean),updatedAt:Date.now(),messages:clean};
    if(idx>=0)sessions[idx]=data;else sessions.unshift(data);
    saveSessions(sessions);
    try{localStorage.setItem(CURRENT_SESSION_KEY,currentSessionId);}catch(e){}
  }catch(e){/* storage unavailable/full — fail silently */}
}

// builds one message row: a bubble holding the content plus a pin toggle button.
// content lives in its own child div so setRow() can replace it without
// clobbering the pin button.
function renderRowEl(m){
  const thread=document.getElementById('thread');
  const row=document.createElement('div');row.className='row '+m.role;row.id=m.id;
  const bub=document.createElement('div');bub.className='bubble';
  const content=document.createElement('div');content.className='bubble-content';content.innerHTML=m.inner;
  const pinBtn=document.createElement('button');
  pinBtn.className='pin-btn'+(m.pinned?' pinned':'');
  pinBtn.innerHTML='&#128204;';
  pinBtn.setAttribute('aria-label','Pin message');
  pinBtn.onclick=function(e){e.stopPropagation();togglePin(m.id);};
  bub.appendChild(content);bub.appendChild(pinBtn);
  row.appendChild(bub);thread.appendChild(row);
  return row;
}

function togglePin(id){
  const entry=chatLog.find(m=>m.id===id);
  if(!entry)return;
  entry.pinned=!entry.pinned;
  saveChatLog();
  const row=document.getElementById(id);
  const btn=row&&row.querySelector('.pin-btn');
  if(btn)btn.classList.toggle('pinned',entry.pinned);
  tick(8);
}

function renderMessages(messages){
  const thread=document.getElementById('thread');
  thread.innerHTML='';
  if(!messages.length){thread.innerHTML=EMPTY_STATE_HTML;return;}
  messages.forEach(m=>{
    const n=parseInt(m.id.replace('m',''),10);if(n>=msgCount)msgCount=n;
    renderRowEl(m);
    chatLog.push(m);
  });
  thread.scrollTop=thread.scrollHeight;
}

// rebuild the Gemini-format context array from a session's saved bubbles,
// so reopening an old chat lets the AI remember what was said in it.
function rebuildConversationHistory(messages){
  conversationHistory=messages
    .filter(m=>m.role==='user'||m.role==='bot')
    .map(m=>({role:m.role==='bot'?'model':'user',parts:[{text:stripHtml(m.inner)}]}))
    .filter(m=>m.parts[0].text);
}

function restoreChatLog(){
  let sid=null;
  try{sid=localStorage.getItem(CURRENT_SESSION_KEY);}catch(e){}
  let sessions=loadSessions();
  let session=sessions.find(s=>s.id===sid);
  if(!session){
    // migrate the old single-thread log (pre-history-panel versions) into a session, once
    let legacy=[];
    try{legacy=JSON.parse(localStorage.getItem(CHAT_KEY)||'[]');}catch(e){legacy=[];}
    if(legacy.length){
      session={id:newSessionId(),title:sessionTitle(legacy),updatedAt:Date.now(),messages:legacy};
      sessions.unshift(session);saveSessions(sessions);
      try{localStorage.removeItem(CHAT_KEY);}catch(e){}
    }else{
      session={id:newSessionId(),title:'New chat',updatedAt:Date.now(),messages:[]};
    }
  }
  currentSessionId=session.id;
  try{localStorage.setItem(CURRENT_SESSION_KEY,currentSessionId);}catch(e){}
  if(!session.messages.length)return;
  const es=document.getElementById('emptyState');if(es)es.remove();
  renderMessages(session.messages);
  rebuildConversationHistory(session.messages);
}

function clearChat(){
  currentSessionId=newSessionId();
  try{localStorage.setItem(CURRENT_SESSION_KEY,currentSessionId);}catch(e){}
  chatLog=[];msgCount=0;
  document.getElementById('thread').innerHTML=EMPTY_STATE_HTML;
  conversationHistory=[];
}

function openSession(id){
  if(id===currentSessionId){closeHistory();return;}
  const sessions=loadSessions();
  const session=sessions.find(s=>s.id===id);
  if(!session)return;
  currentSessionId=id;
  try{localStorage.setItem(CURRENT_SESSION_KEY,id);}catch(e){}
  chatLog=[];msgCount=0;
  renderMessages(session.messages);
  rebuildConversationHistory(session.messages);
  closeHistory();
  tick(10);
}

function deleteSession(id,evt){
  if(evt)evt.stopPropagation();
  if(!confirm('Delete this chat? This can\'t be undone.'))return;
  saveSessions(loadSessions().filter(s=>s.id!==id));
  if(id===currentSessionId)clearChat();
  renderHistoryList();
  tick(12);
}

function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return 'just now';
  const m=Math.floor(s/60);if(m<60)return m+'m ago';
  const h=Math.floor(m/60);if(h<24)return h+'h ago';
  const d=Math.floor(h/24);if(d<7)return d+'d ago';
  return new Date(ts).toLocaleDateString();
}

function exportSession(id,evt){
  if(evt)evt.stopPropagation();
  const session=loadSessions().find(s=>s.id===id);
  if(!session)return;
  let md='# '+session.title+'\n\n';
  session.messages.forEach(m=>{
    md+=(m.role==='user'?'**You:** ':'**Nexus:** ')+stripHtml(m.inner)+'\n\n';
  });
  const blob=new Blob([md],{type:'text/markdown'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=(session.title||'chat').replace(/[^\w\-]+/g,'_').slice(0,40)+'.md';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
  tick(8);
}

let historyTab='all';
function switchHistoryTab(tab){
  historyTab=tab;
  document.getElementById('tabAll').classList.toggle('active',tab==='all');
  document.getElementById('tabPinned').classList.toggle('active',tab==='pinned');
  renderHistoryList();

function renderHistoryList(){
  const list=document.getElementById('historyList');
  if(historyTab==='pinned'){renderPinnedList(list);return;}
  const sessions=loadSessions().filter(s=>s.messages&&s.messages.length).sort((a,b)=>b.updatedAt-a.updatedAt);
  if(!sessions.length){
    list.innerHTML='<div class="history-empty">No saved chats yet. Start talking to Nexus and it\'ll show up here.</div>';
    return;
  }
  list.innerHTML=sessions.map(s=>{
    const count=s.messages.length;
    return '<div class="history-item'+(s.id===currentSessionId?' active':'')+'" onclick="openSession(\''+s.id+'\')">'+
      '<div class="history-item-body">'+
        '<div class="history-item-title">'+esc(s.title)+'</div>'+
        '<div class="history-item-meta">'+timeAgo(s.updatedAt)+' &middot; '+count+' message'+(count===1?'':'s')+'</div>'+
      '</div>'+
      '<button class="history-item-export" onclick="exportSession(\''+s.id+'\',event)" aria-label="Export chat">&#8681;</button>'+
      '<button class="history-item-del" onclick="deleteSession(\''+s.id+'\',event)" aria-label="Delete chat">&#128465;</button>'+
    '</div>';
  }).join('');
}

function renderPinnedList(list){
  const pins=[];
  loadSessions().forEach(s=>{
    (s.messages||[]).forEach(m=>{
      if(m.pinned)pins.push({sessionId:s.id,sessionTitle:s.title,role:m.role,text:stripHtml(m.inner)});
    });
  });
  if(!pins.length){
    list.innerHTML='<div class="history-empty">No pinned messages yet. Tap the pin icon on any message to save it here.</div>';
    return;
  }
  list.innerHTML=pins.map(p=>{
    const snippet=p.text.length>80?p.text.slice(0,80)+'…':p.text;
    return '<div class="history-item" onclick="openSession(\''+p.sessionId+'\')">'+
      '<div class="history-item-body">'+
        '<div class="pin-item-role">'+(p.role==='user'?'You':'Nexus')+' &middot; '+esc(p.sessionTitle)+'</div>'+
        '<div class="history-item-title">'+esc(snippet)+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function openHistory(){
  saveChatLog(); // make sure the in-progress chat shows up if it already has messages
  historyTab='all';
  document.getElementById('tabAll').classList.add('active');
  document.getElementById('tabPinned').classList.remove('active');
  renderHistoryList();
  document.getElementById('historyScreen').classList.add('visible');
  tick(10);
}
function closeHistory(){document.getElementById('historyScreen').classList.remove('visible');}

function addRow(role,inner){
  const es=document.getElementById('emptyState');if(es)es.remove();
  const id='m'+(++msgCount);
  const m={id,role,inner,pinned:false};
  renderRowEl(m);
  document.getElementById('thread').scrollTop=document.getElementById('thread').scrollHeight;
  chatLog.push(m);saveChatLog();
  return id;
}
function setRow(id,inner){
  const row=document.getElementById(id);
  if(row){const c=row.querySelector('.bubble-content');if(c)c.innerHTML=inner;}
  document.getElementById('thread').scrollTop=99999;
  const entry=chatLog.find(m=>m.id===id);if(entry){entry.inner=inner;saveChatLog();}
}
function typingRow(){return addRow('bot','<div class="typing"><span></span><span></span><span></span></div>');}

// reveals AI text progressively (plain text) then swaps in the fully
// formatted markdown once done, so it feels like it's "typing" without
// waiting ages on long responses.
function typeIntoRow(id,text,onDone){
  const row=document.getElementById(id);
  const el=row&&row.querySelector('.bubble-content');
  if(!el){onDone&&onDone();return;}
  el.textContent='';
  const total=text.length;
  const steps=Math.min(60,Math.max(20,Math.ceil(total/4)));
  const chunk=Math.max(1,Math.ceil(total/steps));
  let i=0;
  function step(){
    i=Math.min(total,i+chunk);
    el.textContent=text.slice(0,i);
    document.getElementById('thread').scrollTop=99999;
    if(i<total)setTimeout(step,16);
    else onDone&&onDone();
  }
  step();
}

function followupChipsHtml(){
  return '<div class="followups">'+
    '<div class="followup-chip" onclick="respond(\'Can you explain that more simply?\')">Explain simpler</div>'+
    '<div class="followup-chip" onclick="respond(\'Can you give me an example?\')">Give an example</div>'+
    '<div class="followup-chip" onclick="respond(\'Tell me more about that.\')">Tell me more</div>'+
  '</div>';
}

// ── MEMORY (persists across every chat, not just the current session) ────────
const MEMORY_KEY='nexus_memory_facts';
function loadMemoryFacts(){try{return JSON.parse(localStorage.getItem(MEMORY_KEY)||'[]');}catch(e){return [];}}
function saveMemoryFacts(facts){try{localStorage.setItem(MEMORY_KEY,JSON.stringify(facts));}catch(e){}}
function addMemoryFact(fact){const facts=loadMemoryFacts();facts.push({text:fact,addedAt:Date.now()});saveMemoryFacts(facts);}

// ── WEATHER (OpenWeatherMap via /api/weather — needs OPENWEATHER_API_KEY set in Vercel) ──
const WEATHER_PROXY_URL='/api/weather';
function weatherEmoji(id){
  if(id>=200&&id<300)return '⛈️';
  if(id>=300&&id<600)return id<500?'🌦️':'🌧️';
  if(id>=600&&id<700)return '❄️';
  if(id>=700&&id<800)return '🌫️';
  if(id===800)return '☀️';
  if(id>800)return '☁️';
  return '🌡️';
}
function renderWeather(url,fallbackName,rowId){
  fetch(url).then(r=>r.json()).then(data=>{
    if(!data||!data.main){
      setRow(rowId,(data&&data.message?esc(data.message):"Couldn't find weather for that location.")+'<span class="tag err">Error</span>');
      return;
    }
    const temp=Math.round(data.main.temp),feels=Math.round(data.main.feels_like);
    const w=data.weather&&data.weather[0]||{};
    const emoji=weatherEmoji(w.id||0);
    const name=data.name||fallbackName||'your location';
    setRow(rowId,
      '<div class="ai-body"><p style="font-size:28px;margin:0 0 4px">'+emoji+' <strong>'+temp+'°C</strong></p>'+
      '<p>'+esc(name)+' &middot; '+esc(w.description||'')+'<br>Feels like '+feels+'°C &middot; Humidity '+data.main.humidity+'% &middot; Wind '+Math.round(data.wind?.speed||0)+' m/s</p></div>'+
      '<span class="tag green">Weather</span>'
    );
  }).catch(()=>setRow(rowId,"Couldn't reach the weather service.<span class=\"tag err\">Error</span>"));
}
function getWeather(place,rowId){
  if(place){
    renderWeather(WEATHER_PROXY_URL+'?city='+encodeURIComponent(place),place,rowId);
  }else if(typeof userLat!=='undefined'&&userLat&&userLon){
    renderWeather(WEATHER_PROXY_URL+'?lat='+userLat+'&lon='+userLon,null,rowId);
  }else if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      userLat=pos.coords.latitude;userLon=pos.coords.longitude;
      renderWeather(WEATHER_PROXY_URL+'?lat='+userLat+'&lon='+userLon,null,rowId);
    },()=>setRow(rowId,'I need location access for local weather — or ask "weather in [city]".<span class="tag err">Error</span>'));
  }else{
    setRow(rowId,'Try asking "weather in [city]".<span class="tag">Weather</span>');
  }
}

// ── IMAGE GENERATION (Gemini/Imagen via /api/image — needs GEMINI_API_KEY set in Vercel) ──
const IMAGE_PROXY_URL='/api/image';
async function generateImage(prompt,rowId){
  try{
    const res=await fetch(IMAGE_PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
    const data=await res.json();
    const parts=data?.candidates?.[0]?.content?.parts||[];
    const imgPart=parts.find(p=>p.inlineData||p.inline_data);
    const inline=imgPart&&(imgPart.inlineData||imgPart.inline_data);
    if(!inline){
      setRow(rowId,"Couldn't generate that image — try a different prompt.<span class=\"tag err\">Error</span>");
      return;
    }
    const mime=inline.mimeType||inline.mime_type||'image/png';
    const src='data:'+mime+';base64,'+inline.data;
    const dlId=rowId+'_dl';
    setRow(rowId,
      '<img src="'+src+'" style="width:100%;border-radius:12px;display:block;margin-top:4px" alt="'+esc(prompt)+'">'+
      '<button class="action-btn" id="'+dlId+'">Download</button>'+
      '<span class="tag green">Image</span>'
    );
    const btn=document.getElementById(dlId);
    if(btn)btn.onclick=function(){
      const a=document.createElement('a');
      a.href=src;a.download=prompt.replace(/[^\w\-]+/g,'_').slice(0,40)+'.png';
      document.body.appendChild(a);a.click();a.remove();
    };
  }catch(e){
    setRow(rowId,"Couldn't reach the image service.<span class=\"tag err\">Error</span>");
  }
}

// ── GEMINI AI ────────────────────────────────────────────────────────────────
let conversationHistory=[];
const SYSTEM_PROMPT='You are Nexus, a smart personal AI assistant running on Android. Answer clearly and concisely. Use markdown: **bold** for key terms, bullet lists where helpful, numbered steps, code blocks where needed. For homework always show working. Remember everything the user has told you in this conversation. You can help with anything: questions, writing, coding, maths, advice, and more.';
function buildSystemPrompt(){
  const now=new Date();
  const dateStr=now.toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const timeStr=now.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  let prompt=SYSTEM_PROMPT+' Today\'s real date is '+dateStr+', and the current local time is '+timeStr+' — always use this as the true current date/time, not any date you might otherwise assume.';
  const facts=loadMemoryFacts();
  if(facts.length)prompt+=' The user has asked you to remember these facts about them — they apply across every conversation, not just this one: '+facts.map(f=>f.text).join('; ')+'.';
  return prompt;
}

async function handleAI(question,label,rowId){
  conversationHistory.push({role:'user',parts:[{text:question}]});
  try{
    const body={system_instruction:{parts:[{text:buildSystemPrompt()}]},contents:conversationHistory};
    const res=await fetch(GEMINI_PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||"Sorry, couldn't get a response.";
    conversationHistory.push({role:'model',parts:[{text:text}]});
    typeIntoRow(rowId,text,()=>{
      setRow(rowId,'<div class="ai-body">'+mdToHtml(text)+'</div><span class="tag">'+label+'</span>'+followupChipsHtml());
      speak(text);
    });
  }catch(e){
    conversationHistory.pop();
    setRow(rowId,"Couldn't reach AI &mdash; check your connection.<br><span class=\"tag err\">Error</span>");
  }
}

// ── RESPOND ───────────────────────────────────────────────────────────────────
async function respond(raw){
  if(!raw.trim())return;
  if('speechSynthesis' in window) speechSynthesis.cancel();
  tick(10);
  addRow('user',esc(raw));
  const tid=typingRow();
  const intent=detectIntent(raw);

  switch(intent.type){
    case 'yt_subscriptions':
      setTimeout(()=>{setRow(tid,'Opening your <strong>YouTube subscriptions</strong>.<br><span class="tag">YouTube</span>');setTimeout(()=>window.open('https://www.youtube.com/feed/channels','_blank'),700);},400);
      break;
    case 'yt_unsubscribe':
      setTimeout(()=>{
        const url='https://www.youtube.com/results?search_query='+encodeURIComponent(intent.channel);
        setRow(tid,'I can\'t unsubscribe directly, but here\'s <strong>'+esc(intent.channel)+'</strong> — open the channel and tap "Subscribed" to remove it, or manage everything at once on your subscriptions page.<br>'+
          '<button class="action-btn" onclick="window.open(\''+url+'\',\'_blank\')">Find channel</button>'+
          '<button class="action-btn ghost" onclick="window.open(\'https://www.youtube.com/feed/channels\',\'_blank\')">Manage subscriptions</button>'+
          '<span class="tag">YouTube</span>');
      },400);
      break;
    case 'yt_play':
      setTimeout(()=>setRow(tid,'<div class="yt-player"><iframe src="https://www.youtube.com/embed/'+intent.videoId+'?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div><span class="tag">YouTube</span>'),400);
      break;
    case 'search_prompt':
      setRow(tid,'What would you like me to search for?<br><span class="tag">Search</span>');
      break;
    case 'call_prompt':
      setRow(tid,'Who should I call? Just say or type a name or number.<br><span class="tag">Call</span>');
      break;
    case 'call':{
      const d=intent.target.replace(/\D/g,'');
      setTimeout(()=>{setRow(tid,'Calling <strong>'+esc(intent.target)+'</strong>.<br><span class="tag">Dialing</span>');setTimeout(()=>{location.href='tel:'+d;},900);},400);
      break;}
    case 'sms':{
      const d=intent.target.replace(/\D/g,'');
      setTimeout(()=>{setRow(tid,'Opening message to <strong>'+esc(intent.target)+'</strong>.<br><span class="tag">Messages</span>');setTimeout(()=>{location.href='sms:'+d;},900);},400);
      break;}
    case 'email':{
      setTimeout(()=>{setRow(tid,'Opening email to <strong>'+esc(intent.target)+'</strong>.<br><span class="tag">Email</span>');setTimeout(()=>{location.href='mailto:'+intent.target;},900);},400);
      break;}
    case 'timer':
      setTimer(intent.duration, tid);
      break;
    case 'alarm':
      setAlarm(intent.time, tid);
      break;
    case 'reminder':
      setReminder(intent.note, intent.when, tid);
      break;
    case 'remember':
      addMemoryFact(intent.fact);
      setRow(tid,'Got it — I\'ll remember that <strong>'+esc(intent.fact)+'</strong>. This carries into future chats too.<span class="tag green">Memory</span>');
      break;
    case 'forget':{
      const facts=loadMemoryFacts();
      const needle=intent.fact.toLowerCase();
      const filtered=facts.filter(f=>!f.text.toLowerCase().includes(needle)&&!needle.includes(f.text.toLowerCase()));
      saveMemoryFacts(filtered);
      setRow(tid, filtered.length<facts.length ? 'Forgot that.<span class="tag green">Memory</span>' : "I couldn't find that in what I remember.<span class=\"tag\">Memory</span>");
      break;}
    case 'recall_memory':{
      const facts=loadMemoryFacts();
      if(!facts.length){setRow(tid,'I don\'t have anything saved about you yet. Try "remember I\'m vegetarian".<span class="tag">Memory</span>');}
      else{setRow(tid,'<div class="ai-body">Here\'s what I remember about you:<ul>'+facts.map(f=>'<li>'+esc(f.text)+'</li>').join('')+'</ul></div><span class="tag">Memory</span>');}
      break;}
    case 'weather':
      setRow(tid,'Checking the weather...');
      getWeather(intent.place, tid);
      break;
    case 'image_gen':
      setRow(tid,'Generating your image...');
      generateImage(intent.prompt, tid);
      break;
    case 'location':
      setRow(tid,'Getting your location...');
      getLocationAndRespond(tid);
      break;
    case 'navigate':
      setTimeout(()=>navigateTo(intent.dest, tid),400);
      break;
    case 'nearby':
      setTimeout(()=>searchNearby(intent.query, tid),400);
      break;
    case 'camera':
      setRow(tid,'Opening camera...<span class="tag green">Camera</span>');
      setTimeout(openCamera,400);
      break;
    case 'share':
      doShare(tid);
      break;
    case 'copy':
      doCopy(intent.text, tid);
      break;
    case 'vibrate':
      doVibrate(tid);
      break;
    case 'battery':
      await getBattery(tid);
      break;
    case 'torch':
      await doTorch(tid);
      break;
    case 'fullscreen':
      doFullscreen(tid);
      break;
    case 'app_open':{
      const app=findApp(intent.app);
      if(app){setTimeout(()=>{setRow(tid,'Opening <strong>'+esc(intent.app)+'</strong>.<br><span class="tag">Opened</span>');setTimeout(()=>window.open(app.o,'_blank'),900);},400);}
      else{await handleAI(raw,'Nexus',tid);}
      break;}
    case 'app_search':{
      const app=findApp(intent.app);
      if(app&&app.s){setTimeout(()=>{setRow(tid,'Searching <strong>'+esc(intent.app)+'</strong> for "'+esc(intent.query)+'".<br><span class="tag">'+esc(intent.app)+'</span>');setTimeout(()=>window.open(app.s(intent.query),'_blank'),900);},400);}
      else if(app){setTimeout(()=>{setRow(tid,'Opening <strong>'+esc(intent.app)+'</strong>.<br><span class="tag">Opened</span>');setTimeout(()=>window.open(app.o,'_blank'),900);},400);}
      else{await handleAI(raw,'Nexus',tid);}
      break;}
    default:
      await handleAI(intent.question,'Nexus',tid);
  }
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
const textInput=document.getElementById('textInput');
const sendBtn=document.getElementById('sendBtn');
textInput.addEventListener('input',()=>{sendBtn.disabled=!textInput.value.trim();});
function handleSend(){const v=textInput.value.trim();if(!v)return;tick(10);respond(v);textInput.value='';sendBtn.disabled=true;}

// ── VOICE ─────────────────────────────────────────────────────────────────────
let recognition=null,listening=false;
function initVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const vdot=document.getElementById('vdot');
  const vlabel=document.getElementById('voiceLabel');
  if(!SR){vlabel.textContent='voice unavailable';return;}
  recognition=new SR();
  recognition.lang='en-US';recognition.interimResults=true;recognition.continuous=false;
  recognition.onstart=()=>{listening=true;document.getElementById('micBtn').classList.add('listening');document.getElementById('micIcon').setAttribute('fill','#fff');vdot.classList.remove('off');vlabel.textContent='listening\u2026';};
  recognition.onresult=(e)=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;textInput.value=t;sendBtn.disabled=!t.trim();if(e.results[e.results.length-1].isFinal){respond(t.trim());textInput.value='';sendBtn.disabled=true;}};
  recognition.onerror=()=>{vlabel.textContent="didn't catch that";};
  recognition.onend=()=>{listening=false;document.getElementById('micBtn').classList.remove('listening');document.getElementById('micIcon').setAttribute('fill','#928C7F');vdot.classList.add('off');vlabel.textContent='voice ready';};
  vlabel.textContent='voice ready';
}
function toggleMic(){if(!recognition)return;tick(10);if(listening)recognition.stop();else{try{recognition.start();}catch(e){}}}

if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='localhost')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
